name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings
  CARGO_INCREMENTAL: 0

jobs:
  check-permissions:
    runs-on: ubuntu-latest
    outputs:
      can-use-self-hosted: ${{ steps.check.outputs.allowed }}
    steps:
      - id: check
        run: |
          if [ "${{ github.event_name }}" == "push" ]; then
            echo "allowed=true" >> $GITHUB_OUTPUT
          elif [ "${{ github.event.pull_request.head.repo.full_name }}" == "${{ github.repository }}" ]; then
            echo "allowed=true" >> $GITHUB_OUTPUT
          else
            echo "allowed=false" >> $GITHUB_OUTPUT
            echo "::warning::Fork PR detected. Using GitHub-hosted runners."
          fi

  nix-verification:
    needs: check-permissions
    runs-on: ${{ needs.check-permissions.outputs.can-use-self-hosted == 'true' && 'self-hosted' || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@v7
      - uses: cachix/install-nix-action@v25
        with:
          nix_path: nixpkgs=channel:nixos-unstable
      - uses: DeterminateSystems/magic-nix-cache-action@v2
      - run: nix flake check --impure

  rust-deep-verification:
    needs: check-permissions
    runs-on: ${{ needs.check-permissions.outputs.can-use-self-hosted == 'true' && 'self-hosted' || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: clippy, rustfmt
          cache-workspaces: true

      - name: Check
        run: cargo check --locked --all-targets --workspace

      - name: Test
        run: cargo test --locked --workspace

      - name: Clippy
        run: cargo clippy --locked --all-targets -- --deny warnings

      - name: Format
        run: cargo fmt --check

  check-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: clippy, rustfmt
          cache-workspaces: true
      - run: cargo check --locked --all-targets --workspace
      - run: cargo test --locked --workspace

  binary-profiling:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v7
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache-workspaces: true
      - run: cargo install cargo-bloat --locked
      - run: |
          echo "## Binary Profile" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cargo bloat --release --bin portail --crates >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

  python:
    needs: check-permissions
    runs-on: ${{ needs.check-permissions.outputs.can-use-self-hosted == 'true' && 'self-hosted' || 'ubuntu-latest' }}
    defaults:
      run:
        working-directory: plugins/portail-mcp
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e ".[dev]"
      - run: pip install ruff && ruff check
