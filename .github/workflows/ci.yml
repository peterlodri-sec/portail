name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings
  CARGO_INCREMENTAL: 0

jobs:
  check:
    strategy:
      matrix:
        include:
          - os: self-hosted
            label: linux
          - os: macos-latest
            label: macos
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: clippy, rustfmt

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ matrix.label }}-cargo-registry-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ matrix.label }}-cargo-registry-

      - name: Check
        run: cargo check --locked

      - name: Test
        run: cargo test --locked

      - name: Clippy
        run: cargo clippy --locked --all-targets

      - name: Format
        run: cargo fmt --check

  nix:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - name: Flake check
        run: nix flake check --impure

  python:
    runs-on: self-hosted
    defaults:
      run:
        working-directory: plugins/portail-mcp
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: pip install -e ".[dev]"
      - name: Lint
        run: pip install ruff && ruff check
