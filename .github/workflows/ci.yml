name: CI

# Security: Self-hosted runners are ONLY used for:
# 1. Pushes to main (from maintainers/agents)
# 2. PRs from the same repo (not forks)
# 3. PRs from authorized users (via label or approval)
#
# Fork PRs use GitHub-hosted runners (ubuntu-latest) for safety.
# This prevents arbitrary code execution on our self-hosted runners.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings
  CARGO_INCREMENTAL: 0

jobs:
  # ── Security Gate ─────────────────────────────────────────────
  check-permissions:
    runs-on: ubuntu-latest
    outputs:
      can-use-self-hosted: ${{ steps.check.outputs.allowed }}
    steps:
      - name: Check if PR is from same repo (not a fork)
        id: check
        run: |
          if [ "${{ github.event_name }}" == "push" ]; then
            # Pushes to main are always allowed (maintainers/agents)
            echo "allowed=true" >> $GITHUB_OUTPUT
          elif [ "${{ github.event.pull_request.head.repo.full_name }}" == "${{ github.repository }}" ]; then
            # PRs from the same repo are allowed
            echo "allowed=true" >> $GITHUB_OUTPUT
          else
            # Fork PRs are NOT allowed on self-hosted runners
            echo "allowed=false" >> $GITHUB_OUTPUT
            echo "::warning::Fork PR detected. Using GitHub-hosted runners for safety."
          fi

  # ── Linux Build (self-hosted or GitHub-hosted) ────────────────
  check-linux:
    needs: check-permissions
    runs-on: ${{ needs.check-permissions.outputs.can-use-self-hosted == 'true' && 'self-hosted' || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: clippy, rustfmt

      - name: Cache cargo registry
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: linux-cargo-registry-${{ hashFiles('Cargo.lock') }}
          restore-keys: linux-cargo-registry-

      - name: Check
        run: cargo check --locked

      - name: Test
        run: cargo test --locked

      - name: Clippy
        run: cargo clippy --locked --all-targets

      - name: Format
        run: cargo fmt --check

  # ── macOS Build (always GitHub-hosted) ────────────────────────
  check-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: clippy, rustfmt

      - name: Check
        run: cargo check --locked

      - name: Test
        run: cargo test --locked

  # ── Nix Build (self-hosted or GitHub-hosted) ──────────────────
  nix:
    needs: check-permissions
    runs-on: ${{ needs.check-permissions.outputs.can-use-self-hosted == 'true' && 'self-hosted' || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@v7
      - name: Flake check
        run: nix flake check --impure

  # ── Python Lint (self-hosted or GitHub-hosted) ────────────────
  python:
    needs: check-permissions
    runs-on: ${{ needs.check-permissions.outputs.can-use-self-hosted == 'true' && 'self-hosted' || 'ubuntu-latest' }}
    defaults:
      run:
        working-directory: plugins/portail-mcp
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: pip install -e ".[dev]"
      - name: Lint
        run: pip install ruff && ruff check
