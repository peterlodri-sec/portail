name: Loop-State-PM
on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
      - name: Run loop-state-pm
        run: bash scripts/loop-state-pm.sh
