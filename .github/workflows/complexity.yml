name: Complexity Analysis

# Architecture: Runs on every push to main and PRs.
# Analyzes time complexity (Big O notation) across all Rust source files.
# Generates a report and comments on PRs with complexity findings.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  analyze:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v7

      - name: Run complexity analysis
        run: |
          chmod +x scripts/complexity-analysis.sh
          ./scripts/complexity-analysis.sh

      - name: Upload report
        uses: actions/upload-artifact@v7
        with:
          name: complexity-report
          path: target/complexity-report.md

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('target/complexity-report.md', 'utf8');
            const body = `## Time Complexity Analysis\n\n${report}`;
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body.substring(0, 65536) // GitHub comment limit
            });
