name: Chore Bot

# v1.4 — Mechanical Rust cleanup agent.
# Advisory-only: never blocks CI, always exits 0.
# Runs cargo fix + clippy --fix + fmt. Comments report on PR.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  chore:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v7

      - name: Run chore bot
        run: |
          chmod +x scripts/rust-chore.sh
          bash scripts/rust-chore.sh fix
          bash scripts/rust-chore.sh verify

      - name: Generate report
        run: |
          bash scripts/rust-chore.sh report > /tmp/chore-report.md

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('/tmp/chore-report.md', 'utf8');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: report.substring(0, 65536)
            });
