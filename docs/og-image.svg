<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="100%" style="stop-color:#1a1a1a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d4ff"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Grid pattern -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#222" stroke-width="0.5"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)" opacity="0.5"/>
  
  <!-- Logo -->
  <text x="600" y="200" font-family="SF Mono, Fira Code, monospace" font-size="72" font-weight="300" fill="url(#accent)" text-anchor="middle" letter-spacing="0.3em">PORTAIL</text>
  
  <!-- Tagline -->
  <text x="600" y="260" font-family="SF Mono, Fira Code, monospace" font-size="18" fill="#666" text-anchor="middle">Unified Proxy/Gateway</text>
  
  <!-- Features -->
  <text x="600" y="320" font-family="SF Mono, Fira Code, monospace" font-size="16" fill="#e0e0e0" text-anchor="middle">AI Gateway • MCP Gateway • CDN Cache • A2A Protocol</text>
  
  <!-- Tech stack -->
  <text x="600" y="380" font-family="SF Mono, Fira Code, monospace" font-size="14" fill="#444" text-anchor="middle">Built in Rust with zero-copy I/O, SIMD-optimized hashing, and live TUI dashboard</text>
  
  <!-- Stats -->
  <text x="300" y="450" font-family="SF Mono, Fira Code, monospace" font-size="14" fill="#00d4ff" text-anchor="middle">107 Tests</text>
  <text x="600" y="450" font-family="SF Mono, Fira Code, monospace" font-size="14" fill="#00d4ff" text-anchor="middle">MIT License</text>
  <text x="900" y="450" font-family="SF Mono, Fira Code, monospace" font-size="14" fill="#00d4ff" text-anchor="middle">Self-Hosted</text>
  
  <!-- URL -->
  <text x="600" y="550" font-family="SF Mono, Fira Code, monospace" font-size="16" fill="#333" text-anchor="middle">portail.vaked.dev</text>
</svg>
