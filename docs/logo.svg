<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="#0a0a0a" stroke="url(#grad)" stroke-width="2"/>
  
  <!-- P -->
  <text x="50" y="130" font-family="SF Mono, Fira Code, monospace" font-size="80" font-weight="bold" fill="url(#grad)">P</text>
  
  <!-- Arrow/flow -->
  <path d="M 110 70 L 150 100 L 110 130" fill="none" stroke="#00d4ff" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Dot -->
  <circle cx="160" cy="100" r="8" fill="#7c3aed"/>
</svg>
