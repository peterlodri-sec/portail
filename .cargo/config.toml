# Portail — Hyper-Optimized Cargo Configuration
# Nix-first, native performance.

# ── Linux: wild linker (unbelievably fast) ─────────────────────
[target.x86_64-unknown-linux-gnu]
linker = "clang"
rustflags = ["-C", "link-arg=-fuse-ld=wild"]

[target.aarch64-unknown-linux-gnu]
linker = "clang"
rustflags = ["-C", "link-arg=-fuse-ld=wild"]

# ── Nightly compiler flags ─────────────────────────────────────
[build]
rustflags = ["-Zshare-generics=y", "-Zthreads=0"]

[rustdoc]
rustflags = ["-Zunstable-options", "--generate-link-to-definition"]

# ── Profiles ───────────────────────────────────────────────────
[profile.release]
opt-level = 3
lto = "fat"
codegen-units = 1
strip = "symbols"
debug = false

[profile.dev]
opt-level = 0
debug = false
split-debuginfo = "off"
incremental = true
codegen-units = 256

[profile.dev.package."*"]
opt-level = 3
debug = false

[profile.test]
opt-level = 0
debug = false
incremental = true
codegen-units = 256

[profile.ci]
inherits = "dev"
opt-level = 1
debug = false
incremental = false
codegen-units = 128

[profile.bench]
opt-level = 3
lto = "fat"
codegen-units = 1
debug = false

[lib]
test = true
doctest = true
bench = true
