[target.x86_64-unknown-linux-gnu]
linker = "clang"
rustflags = ["-C", "link-arg=-fuse-ld=mold"]

[target.aarch64-apple-darwin]
rustflags = []

# ── Nightly: fast compile + better diagnostics ───────────────────
[build]
rustflags = [
    "-Zshare-generics=y",
    "-Zthreads=0",
    "-Zmacro-backtrace",
]

[rustdoc]
rustflags = ["-Zunstable-options", "--generate-link-to-definition"]

# ── Release ─────────────────────────────────────────────────────
[profile.release]
opt-level = 3
lto = "fat"
codegen-units = 1
strip = "symbols"
debug = false

# ── Dev: fast compilation ────────────────────────────────────────
[profile.dev]
opt-level = 0
debug = false
split-debuginfo = "off"
incremental = true
codegen-units = 256

# ── Dev-test: optimized but debuggable ───────────────────────────
[profile.dev-test]
inherits = "dev"
opt-level = 0
debug = false
incremental = true
codegen-units = 256

# ── Bench ────────────────────────────────────────────────────────
[profile.bench]
opt-level = 3
lto = "fat"
codegen-units = 1
debug = false

# ── Fast checkout (CI) ───────────────────────────────────────────
[profile.ci]
inherits = "dev"
opt-level = 1
debug = false
incremental = false
codegen-units = 128

# ── Test config ──────────────────────────────────────────────────
[lib]
test = true
doctest = true
bench = true
